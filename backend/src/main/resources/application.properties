spring.application.name=tile-backend

server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tile}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:tile}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:tilepass}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=false
spring.flyway.locations=filesystem:src/main/resources/db/migration,classpath:db/migration
spring.flyway.fail-on-missing-locations=false
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

management.endpoints.web.exposure.include=health
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:25MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:25MB}

app.jwt.secret=${APP_JWT_SECRET:change-this-secret-to-a-long-random-value-1234567890}
app.jwt.expiration=PT8H
app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:5173}
app.bootstrap.username=${APP_BOOTSTRAP_USERNAME:testuser}
app.bootstrap.password=${APP_BOOTSTRAP_PASSWORD:pass123}
asset.storage.base-path=${ASSET_STORAGE_BASE_PATH:./data/assets}
